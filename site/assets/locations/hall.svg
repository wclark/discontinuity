<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Empty memorial hall</title>
  <desc id="desc">A textural illustration of an old hall with stairs, draped portrait, and rainlit windows.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7b5d42"/>
      <stop offset="0.52" stop-color="#c0a27a"/>
      <stop offset="1" stop-color="#4a3a2c"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2f251f"/>
      <stop offset="0.5" stop-color="#76553a"/>
      <stop offset="1" stop-color="#231c18"/>
    </linearGradient>
    <radialGradient id="windowGlow" cx="50%" cy="32%" r="52%">
      <stop offset="0" stop-color="#e5edf0" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#8398a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
