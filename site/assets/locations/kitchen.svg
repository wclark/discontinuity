    <circle cx="168" cy="220" r="48"/>
    <circle cx="298" cy="230" r="56"/>
    <circle cx="430" cy="216" r="42"/>
    <circle cx="586" cy="232" r="58"/>
    <circle cx="732" cy="214" r="44"/>
  </g>
