<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Empty servant kitchen</title>
  <desc id="desc">A warm kitchen with copper pans, tiled floor, and steam.</desc>
  <defs>
    <linearGradient id="kWall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b9854e"/>
      <stop offset="0.55" stop-color="#e0c19a"/>
      <stop offset="1" stop-color="#66412d"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6b4a36"/>
      <stop offset="1" stop-color="#2d211a"/>
    </linearGradient>
    <filter id="steamBlur">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="960" height="720" fill="#2b1f17"/>
  <rect width="960" height="472" fill="url(#kWall)"/>
  <rect y="472" width="960" height="248" fill="url(#tile)"/>
